<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60">
  <defs>
    <style>
      text { font-family: 'Inter', 'SF Pro', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #fff; dominant-baseline: central; text-anchor: middle; }
      rect { rx: 8; ry: 8; }
    </style>
  </defs>
  <!-- OpenAI -->
  <rect x="0" y="10" width="100" height="40" fill="#000000"/>
  <text x="50" y="30">OpenAI</text>
