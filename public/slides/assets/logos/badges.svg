  <rect x="330" y="10" width="100" height="40" fill="#0866FF"/>
  <text x="380" y="30">Meta</text>
  <!-- Microsoft -->
  <rect x="440" y="10" width="100" height="40" fill="#00A4EF"/>
  <text x="490" y="30">Microsoft</text>
  <!-- n8n -->
  <rect x="550" y="10" width="100" height="40" fill="#EA4B71"/>
  <text x="600" y="30">n8n</text>
  <!-- Zapier -->
  <rect x="660" y="10" width="100" height="40" fill="#FF4A00"/>
