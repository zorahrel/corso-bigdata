<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <style>
      .layer-label { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #fff; dominant-baseline: central; }
      .layer-desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: rgba(255,255,255,0.7); dominant-baseline: central; }
      .layer-num { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 800; fill: rgba(255,255,255,0.4); dominant-baseline: central; text-anchor: middle; }
      .title { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: rgba(255,255,255,0.5); text-anchor: middle; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </defs>

  <text x="350" y="25" class="title">Context Engineering — 4 Layer</text>

  <!-- Layer 1: System Prompt (viola) -->
  <rect x="50" y="50" width="600" height="70" rx="12" fill="#6c63ff" opacity="0.9"/>
  <text x="80" y="75" class="layer-num" style="fill:rgba(255,255,255,0.3); font-size:28px;">1</text>
  <text x="120" y="75" class="layer-label">System Prompt</text>
  <text x="120" y="100" class="layer-desc">Istruzioni base, personalita, regole, vincoli del modello</text>

  <!-- Layer 2: Memory (teal) -->
  <rect x="50" y="135" width="600" height="70" rx="12" fill="#00d4aa" opacity="0.9"/>
  <text x="80" y="160" class="layer-num" style="fill:rgba(0,0,0,0.2); font-size:28px;">2</text>
  <text x="120" y="160" class="layer-label" style="fill:#0f1117;">Memory</text>
  <text x="120" y="185" class="layer-desc" style="fill:rgba(0,0,0,0.6);">Contesto persistente: conversazioni passate, preferenze, fatti</text>

  <!-- Layer 3: Tools (arancione) -->
  <rect x="50" y="220" width="600" height="70" rx="12" fill="#FF8C42" opacity="0.9"/>
  <text x="80" y="245" class="layer-num" style="fill:rgba(0,0,0,0.2); font-size:28px;">3</text>
  <text x="120" y="245" class="layer-label" style="fill:#0f1117;">Tools</text>
  <text x="120" y="270" class="layer-desc" style="fill:rgba(0,0,0,0.6);">Funzioni esterne: API, database, ricerca, calcolo, azioni</text>

  <!-- Layer 4: Examples (rosa) -->
  <rect x="50" y="305" width="600" height="70" rx="12" fill="#f093fb" opacity="0.9"/>
  <text x="80" y="330" class="layer-num" style="fill:rgba(255,255,255,0.3); font-size:28px;">4</text>
  <text x="120" y="330" class="layer-label">Examples (Few-shot)</text>
  <text x="120" y="355" class="layer-desc">Esempi input/output che guidano formato e stile della risposta</text>

  <!-- Side bracket -->
  <path d="M665,55 Q685,55 685,100 L685,320 Q685,370 665,370" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="695" y="212" class="layer-desc" style="font-size:10px; writing-mode:tb; text-anchor:middle;" transform="rotate(0)">CONTEXT WINDOW</text>
</svg>
