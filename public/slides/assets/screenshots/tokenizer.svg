<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      .tok-text { font-family: 'Inter', system-ui, sans-serif; dominant-baseline: central; }
      .tok-ui { font-family: 'Inter', system-ui, sans-serif; fill: #666; font-size: 13px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="#ffffff" rx="12"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="900" height="50" fill="#f7f7f8" rx="12"/>
  <rect x="0" y="12" width="900" height="38" fill="#f7f7f8"/>
  <text x="30" y="30" class="tok-text" font-size="16" font-weight="700" fill="#202123">OpenAI Tokenizer</text>
  <text x="200" y="30" class="tok-text" font-size="12" fill="#8e8ea0">platform.openai.com/tokenizer</text>

  <!-- Model selector -->
  <rect x="680" y="14" width="190" height="28" rx="6" fill="#fff" stroke="#d9d9e3" stroke-width="1"/>
  <text x="700" y="30" class="tok-text" font-size="11" fill="#666">Model: cl100k_base (GPT-4)</text>

  <!-- Input area label -->
  <text x="30" y="80" class="tok-text" font-size="12" fill="#8e8ea0" font-weight="600">INPUT TEXT</text>

  <!-- Token boxes - "L'intelligenza artificiale sta cambiando il mondo" -->
  <g transform="translate(30, 100)">
    <!-- Token 1: L' -->
    <rect x="0" y="0" width="38" height="44" rx="4" fill="#aee4c7" opacity="0.6"/>
    <text x="19" y="24" class="tok-text" font-size="16" fill="#1a7f37" text-anchor="middle" font-weight="500">L'</text>

    <!-- Token 2: intelli -->
    <rect x="44" y="0" width="80" height="44" rx="4" fill="#f9c9c0" opacity="0.6"/>
    <text x="84" y="24" class="tok-text" font-size="16" fill="#b35642" text-anchor="middle" font-weight="500">intelli</text>

    <!-- Token 3: genza -->
    <rect x="130" y="0" width="72" height="44" rx="4" fill="#b8d4f0" opacity="0.6"/>
    <text x="166" y="24" class="tok-text" font-size="16" fill="#3a6ea5" text-anchor="middle" font-weight="500">genza</text>

    <!-- Token 4: (space)artific -->
    <rect x="208" y="0" width="98" height="44" rx="4" fill="#f0d8a8" opacity="0.6"/>
    <text x="257" y="24" class="tok-text" font-size="16" fill="#8a6d3b" text-anchor="middle" font-weight="500"> artific</text>

    <!-- Token 5: iale -->
    <rect x="312" y="0" width="52" height="44" rx="4" fill="#d4b8f0" opacity="0.6"/>
    <text x="338" y="24" class="tok-text" font-size="16" fill="#6b3fa0" text-anchor="middle" font-weight="500">iale</text>

    <!-- Token 6: (space)sta -->
    <rect x="370" y="0" width="52" height="44" rx="4" fill="#aee4c7" opacity="0.6"/>
    <text x="396" y="24" class="tok-text" font-size="16" fill="#1a7f37" text-anchor="middle" font-weight="500"> sta</text>

    <!-- Token 7: (space)cambi -->
    <rect x="428" y="0" width="82" height="44" rx="4" fill="#f9c9c0" opacity="0.6"/>
    <text x="469" y="24" class="tok-text" font-size="16" fill="#b35642" text-anchor="middle" font-weight="500"> cambi</text>

    <!-- Token 8: ando -->
    <rect x="516" y="0" width="60" height="44" rx="4" fill="#b8d4f0" opacity="0.6"/>
    <text x="546" y="24" class="tok-text" font-size="16" fill="#3a6ea5" text-anchor="middle" font-weight="500">ando</text>

    <!-- Token 9: (space)il -->
    <rect x="582" y="0" width="36" height="44" rx="4" fill="#f0d8a8" opacity="0.6"/>
    <text x="600" y="24" class="tok-text" font-size="16" fill="#8a6d3b" text-anchor="middle" font-weight="500"> il</text>

    <!-- Token 10: (space)mondo -->
    <rect x="624" y="0" width="80" height="44" rx="4" fill="#d4b8f0" opacity="0.6"/>
    <text x="664" y="24" class="tok-text" font-size="16" fill="#6b3fa0" text-anchor="middle" font-weight="500"> mondo</text>
  </g>

  <!-- Token IDs row -->
  <g transform="translate(30, 160)">
    <text x="0" y="0" class="tok-text" font-size="10" fill="#8e8ea0" font-weight="600">TOKEN IDs</text>
    <g transform="translate(0, 16)">
      <text x="19" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">445</text>
      <text x="84" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">46341</text>
      <text x="166" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">70484</text>
      <text x="257" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">9560</text>
      <text x="338" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">2260</text>
      <text x="396" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">6682</text>
      <text x="469" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">11583</text>
      <text x="546" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">2649</text>
      <text x="600" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">321</text>
      <text x="664" y="0" class="tok-text" font-size="10" fill="#8e8ea0" text-anchor="middle">29487</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="30" y1="210" x2="870" y2="210" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Stats bar -->
  <g transform="translate(30, 230)">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#f7f7f8"/>
    <text x="20" y="20" class="tok-text" font-size="11" fill="#8e8ea0">Tokens</text>
    <text x="20" y="40" class="tok-text" font-size="20" font-weight="700" fill="#202123">10</text>

    <rect x="200" y="0" width="180" height="50" rx="8" fill="#f7f7f8"/>
    <text x="220" y="20" class="tok-text" font-size="11" fill="#8e8ea0">Characters</text>
    <text x="220" y="40" class="tok-text" font-size="20" font-weight="700" fill="#202123">48</text>

    <rect x="400" y="0" width="180" height="50" rx="8" fill="#f7f7f8"/>
    <text x="420" y="20" class="tok-text" font-size="11" fill="#8e8ea0">Ratio</text>
    <text x="420" y="40" class="tok-text" font-size="20" font-weight="700" fill="#202123">4.8 char/tok</text>
  </g>
</svg>