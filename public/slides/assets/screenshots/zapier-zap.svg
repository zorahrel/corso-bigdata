<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .z-text { font-family: 'Inter', system-ui, sans-serif; fill: #2d2d2d; text-anchor: middle; dominant-baseline: central; }
      .z-muted { font-family: 'Inter', system-ui, sans-serif; fill: #8c8c8c; text-anchor: middle; dominant-baseline: central; }
      .z-white { font-family: 'Inter', system-ui, sans-serif; fill: #fff; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f5f5f4" rx="12"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="56" fill="#fff" rx="12"/>
  <rect x="0" y="12" width="800" height="44" fill="#fff"/>
  <line x1="0" y1="56" x2="800" y2="56" stroke="#e5e5e5" stroke-width="1"/>
  <text x="80" y="33" class="z-text" font-size="16" font-weight="700" fill="#ff4a00">Zapier</text>
  <text x="400" y="33" class="z-text" font-size="14" font-weight="600">Email → AI Classify → Notion</text>
  <rect x="680" y="16" width="90" height="32" rx="16" fill="#ff4a00"/>
  <text x="725" y="33" class="z-white" font-size="12" font-weight="600">Publish</text>

  <!-- Step 1: Trigger (Gmail) -->
  <rect x="90" y="100" width="180" height="100" rx="12" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="90" y="100" width="180" height="4" rx="2" fill="#ea4335"/>
  <text x="116" y="100" class="z-text" font-size="10" font-weight="600" fill="#8c8c8c" text-anchor="start" dy="-8">1. TRIGGER</text>
  <!-- Gmail icon circle -->
  <circle cx="130" cy="146" r="18" fill="#ea4335" opacity="0.1"/>
  <text x="130" y="148" class="z-text" font-size="18">📧</text>
  <text x="210" y="138" class="z-text" font-size="13" font-weight="600">Gmail</text>
  <text x="210" y="158" class="z-muted" font-size="11">New Email</text>
  <text x="180" y="184" class="z-muted" font-size="10">Quando arriva una nuova email</text>

  <!-- Connector 1→2 -->
  <line x1="270" y1="200" x2="270" y2="220" stroke="#d4d4d4" stroke-width="2"/>
  <circle cx="270" cy="220" r="10" fill="#fff" stroke="#d4d4d4" stroke-width="2"/>
  <text x="270" y="222" class="z-muted" font-size="10">+</text>
  <line x1="270" y1="230" x2="270" y2="250" stroke="#d4d4d4" stroke-width="2"/>

  <!-- Step 2: Filter/AI -->
  <rect x="90" y="250" width="180" height="100" rx="12" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="90" y="250" width="180" height="4" rx="2" fill="#ff4a00"/>
  <text x="116" y="250" class="z-text" font-size="10" font-weight="600" fill="#8c8c8c" text-anchor="start" dy="-8">2. AI ACTION</text>
  <circle cx="130" cy="296" r="18" fill="#ff4a00" opacity="0.1"/>
  <text x="130" y="298" class="z-text" font-size="18">🤖</text>
  <text x="210" y="288" class="z-text" font-size="13" font-weight="600">ChatGPT</text>
  <text x="210" y="308" class="z-muted" font-size="11">Classify Priority</text>
  <text x="180" y="334" class="z-muted" font-size="10">Analizza e classifica urgenza</text>

  <!-- Connector 2→3 -->
  <line x1="270" y1="350" x2="362" y2="350" stroke="#d4d4d4" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Arrow pointing right -->
  <path d="M360,340 L360,360 L400,350 Z" fill="#d4d4d4"/>

  <!-- Step 3: Action (Notion) -->
  <rect x="410" y="100" width="180" height="100" rx="12" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="410" y="100" width="180" height="4" rx="2" fill="#000"/>
  <text x="436" y="100" class="z-text" font-size="10" font-weight="600" fill="#8c8c8c" text-anchor="start" dy="-8">3. ACTION</text>
  <circle cx="450" cy="146" r="18" fill="#000" opacity="0.08"/>
  <text x="450" y="148" class="z-text" font-size="18">📋</text>
  <text x="530" y="138" class="z-text" font-size="13" font-weight="600">Notion</text>
  <text x="530" y="158" class="z-muted" font-size="11">Create DB Item</text>
  <text x="500" y="184" class="z-muted" font-size="10">Salva email classificata nel DB</text>

  <!-- Connector vertical from AI to Notion -->
  <path d="M362,350 Q500,350 500,200" stroke="#d4d4d4" stroke-width="2" fill="none" marker-end="url(#z-arrow)"/>
  <marker id="z-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#d4d4d4"/>
  </marker>

  <!-- Step 4: Slack notification (conditional) -->
  <rect x="620" y="250" width="150" height="90" rx="12" fill="#fff" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="620" y="250" width="150" height="4" rx="2" fill="#4a154b"/>
  <text x="646" y="250" class="z-text" font-size="10" font-weight="600" fill="#8c8c8c" text-anchor="start" dy="-8">4. IF URGENT</text>
  <text x="695" y="290" class="z-text" font-size="18">💬</text>
  <text x="695" y="318" class="z-text" font-size="12" font-weight="600">Slack Alert</text>

  <path d="M590,150 Q650,150 650,250" stroke="#d4d4d4" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#z-arrow)"/>
</svg>