<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .n8n-text { font-family: 'Inter', system-ui, sans-serif; fill: #fff; font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .n8n-sub { font-family: 'Inter', system-ui, sans-serif; fill: rgba(255,255,255,0.5); font-size: 9px; text-anchor: middle; dominant-baseline: central; }
      .n8n-conn { stroke: rgba(255,255,255,0.3); stroke-width: 2; fill: none; }
    </style>
    <marker id="n8n-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.3)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e" rx="12"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="800" height="500" fill="url(#dots)" rx="12"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="50" fill="rgba(0,0,0,0.3)" rx="12"/>
  <rect x="0" y="12" width="800" height="38" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="30" class="n8n-text" font-size="14">Email Triage Automatico</text>
  <circle cx="24" cy="28" r="8" fill="#ff6b6b"/>
  <text x="24" y="29" class="n8n-text" font-size="10">←</text>
  <rect x="680" y="16" width="100" height="28" rx="14" fill="#ff6d5a"/>
  <text x="730" y="31" class="n8n-text" font-size="11">Execute</text>

  <!-- Node 1: Email Trigger -->
  <rect x="40" y="200" width="120" height="70" rx="10" fill="#2d2d44" stroke="#ff6d5a" stroke-width="2"/>
  <text x="100" y="226" class="n8n-text" font-size="11">📧 Email</text>
  <text x="100" y="246" class="n8n-text" font-size="11">Trigger</text>
  <text x="100" y="262" class="n8n-sub">IMAP / Gmail</text>

  <!-- Connection 1→2 -->
  <path d="M160,235 C200,235 200,235 230,235" class="n8n-conn" marker-end="url(#n8n-arrow)"/>

  <!-- Node 2: AI Agent -->
  <rect x="232" y="192" width="136" height="86" rx="10" fill="#2d2d44" stroke="#9b59b6" stroke-width="2.5"/>
  <rect x="232" y="192" width="136" height="86" rx="10" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="300" y="224" class="n8n-text" font-size="12">🤖 AI Agent</text>
  <text x="300" y="244" class="n8n-sub">GPT-4o</text>
  <text x="300" y="260" class="n8n-sub">"Classifica urgenza"</text>

  <!-- Connection 2→3 -->
  <path d="M368,235 C408,235 408,235 440,235" class="n8n-conn" marker-end="url(#n8n-arrow)"/>

  <!-- Node 3: Condition -->
  <g transform="translate(500,235)">
    <rect x="-58" y="-43" width="116" height="86" rx="10" fill="#2d2d44" stroke="#f1c40f" stroke-width="2" transform="rotate(0)"/>
    <text x="0" y="-10" class="n8n-text" font-size="11">❓ Urgente?</text>
    <text x="0" y="10" class="n8n-sub">IF priority</text>
    <text x="0" y="25" class="n8n-sub">== "high"</text>
  </g>

  <!-- Yes branch -->
  <path d="M558,215 C600,180 620,130 650,130" class="n8n-conn" marker-end="url(#n8n-arrow)"/>
  <text x="595" y="168" class="n8n-text" font-size="10" fill="#2ecc71">SI</text>

  <!-- Node 4: Slack Notify -->
  <rect x="652" y="95" width="120" height="70" rx="10" fill="#2d2d44" stroke="#2ecc71" stroke-width="2"/>
  <text x="712" y="122" class="n8n-text" font-size="11">💬 Slack</text>
  <text x="712" y="142" class="n8n-text" font-size="11">Notify</text>
  <text x="712" y="157" class="n8n-sub">#urgenti</text>

  <!-- No branch -->
  <path d="M558,255 C600,290 620,340 650,340" class="n8n-conn" marker-end="url(#n8n-arrow)"/>
  <text x="595" y="300" class="n8n-text" font-size="10" fill="#e74c3c">NO</text>

  <!-- Node 5: Archive -->
  <rect x="652" y="305" width="120" height="70" rx="10" fill="#2d2d44" stroke="#3498db" stroke-width="2"/>
  <text x="712" y="332" class="n8n-text" font-size="11">📁 Archive</text>
  <text x="712" y="352" class="n8n-text" font-size="11">to Notion</text>
  <text x="712" y="367" class="n8n-sub">Database log</text>

  <!-- Bottom status -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.25)"/>
  <circle cx="24" cy="480" r="5" fill="#2ecc71"/>
  <text x="38" y="483" class="n8n-sub" font-size="10" fill="rgba(255,255,255,0.5)">5 nodes · Last run: 2s ago · Executions: 847</text>
</svg>